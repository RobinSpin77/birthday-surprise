<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<!-- WeChat 分享优化 -->
<meta property="og:title" content="🎂 生日惊喜旅程">
<meta property="og:description" content="一份专属于你的惊喜，请查收 💕">
<meta property="og:image" content="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎂</text></svg>">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎂</text></svg>">
<title>🎂 生日惊喜旅程</title>
<style>
/* ========== CSS Variables ========== */
:root {
  --pink: #FF7EB3;
  --pink-light: #FFD4E0;
  --pink-bg: #FFF5F7;
  --gold: #FFB347;
  --gold-light: #FFE0B2;
  --text: #4A3040;
  --text-light: #8B6F7C;
  --white: #FFFFFF;
  --shadow: 0 4px 20px rgba(255, 126, 179, 0.15);
  --shadow-lg: 0 12px 40px rgba(255, 126, 179, 0.2);
  --radius: 20px;
  --radius-sm: 12px;
  --card-padding: 20px;
}

/* ========== Reset & Base ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", sans-serif;
  background: linear-gradient(180deg, #FFF0F3 0%, #FFF5F7 30%, #FFF0F3 100%);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  padding-bottom: 40px;
  background-attachment: fixed;
}

/* ========== Particle Canvas ========== */
#particles-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
}

/* ========== Main Container ========== */
.main-container {
  position: relative;
  z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  padding: 0 16px;
}

/* ========== Hero Section ========== */
.hero {
  text-align: center;
  padding: 40px 20px 24px;
  animation: fadeInDown 0.8s ease-out;
}

.hero-emoji {
  font-size: 64px;
  animation: float 3s ease-in-out infinite;
  display: block;
}

.hero-title {
  font-size: 28px;
  font-weight: 700;
  color: var(--text);
  margin-top: 8px;
  line-height: 1.4;
  white-space: pre-line;
}

.hero-subtitle {
  font-size: 15px;
  color: var(--text-light);
  margin-top: 8px;
  line-height: 1.5;
  white-space: pre-line;
}

/* ========== Birthday Countdown ========== */
.countdown-section {
  text-align: center;
  padding: 0 20px 16px;
}

.countdown-label {
  font-size: 13px;
  color: var(--text-light);
  margin-bottom: 10px;
  font-weight: 500;
}

.countdown-row {
  display: flex;
  justify-content: center;
  gap: 10px;
}

.countdown-unit {
  background: white;
  border-radius: 14px;
  padding: 10px 6px;
  min-width: 62px;
  box-shadow: 0 2px 12px rgba(255,126,179,0.12);
}

.countdown-num {
  font-size: 28px;
  font-weight: 800;
  color: var(--pink);
  line-height: 1;
  font-variant-numeric: tabular-nums;
  font-family: "SF Mono", "Menlo", "Consolas", monospace;
}

.countdown-unit-label {
  font-size: 11px;
  color: var(--text-light);
  margin-top: 4px;
  font-weight: 500;
}

.countdown-separator {
  font-size: 24px;
  font-weight: 700;
  color: var(--pink-light);
  display: flex;
  align-items: center;
  padding-bottom: 16px;
}

/* ========== Progress Bar ========== */
.progress-section {
  margin: 8px 0 24px;
  padding: 0 4px;
}

.progress-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  font-size: 13px;
  color: var(--text-light);
}

.progress-stats {
  font-weight: 600;
  color: var(--pink);
}

.progress-bar-outer {
  background: var(--pink-light);
  border-radius: 10px;
  height: 8px;
  overflow: hidden;
}

.progress-bar-inner {
  height: 100%;
  background: linear-gradient(90deg, var(--pink), var(--gold));
  border-radius: 10px;
  transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  width: 0%;
}

/* ========== Activity Cards ========== */
.activities {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}

.card.locked {
  opacity: 0.75;
  cursor: default;
}

.card.unlocked-unopened {
  cursor: pointer;
  box-shadow: 0 0 0 2px var(--gold), var(--shadow-lg);
  animation: pulseGlow 2s ease-in-out infinite;
}

.card.unlocked-unopened:active {
  transform: scale(0.97);
}

.card.unlocked-opened {
  box-shadow: var(--shadow-lg);
}

.card.newly-unlocked {
  animation: unlockPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

/* Card Header (always visible) */
.card-header {
  display: flex;
  align-items: center;
  padding: var(--card-padding);
  gap: 14px;
  position: relative;
}

.card-icon-wrap {
  width: 52px;
  height: 52px;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  flex-shrink: 0;
  transition: all 0.4s ease;
}

.locked .card-icon-wrap {
  background: #F0E4EA !important;
  filter: grayscale(0.7) blur(10px);
}

.card-info {
  flex: 1;
  min-width: 0;
}

.card-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
}

.locked .card-title {
  filter: blur(8px);
  user-select: none;
  color: #C4A6B5;
  pointer-events: none;
}

.card-subtitle {
  font-size: 13px;
  color: var(--text-light);
  margin-top: 2px;
}

.locked .card-subtitle {
  filter: blur(7px);
  user-select: none;
  color: #D4BCC8;
}

.card-status-icon {
  font-size: 32px;
  flex-shrink: 0;
  transition: transform 0.3s ease;
}

.locked .card-status-icon {
  animation: gentlePulse 2s ease-in-out infinite;
}

/* Countdown */
.countdown {
  font-size: 12px;
  color: var(--pink);
  font-weight: 600;
  margin-top: 4px;
}

.locked .countdown {
  filter: none;
}

/* Unopened overlay */
.unopened-overlay {
  display: none;
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, rgba(255,228,235,0.95), rgba(255,240,245,0.95));
  justify-content: center;
  align-items: center;
  flex-direction: column;
  gap: 8px;
  z-index: 2;
  border-radius: var(--radius);
}

.unlocked-unopened .unopened-overlay {
  display: flex;
}

.unopened-emoji {
  font-size: 48px;
  animation: float 2s ease-in-out infinite;
}

.unopened-text {
  font-size: 15px;
  font-weight: 600;
  color: var(--pink);
}

.unopened-hint {
  font-size: 12px;
  color: var(--text-light);
}

/* Card Content (expandable) */
.card-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.6s cubic-bezier(0.4, 0, 0.2, 1), padding 0.6s ease;
}

.unlocked-opened .card-content {
  max-height: 2000px;
}

.card-content-inner {
  padding: 0 var(--card-padding) var(--card-padding);
}

.content-hero {
  font-size: 48px;
  text-align: center;
  display: block;
  margin-bottom: 12px;
}

.content-summary {
  font-size: 15px;
  line-height: 1.6;
  color: var(--text);
  text-align: center;
  margin-bottom: 16px;
  padding: 12px;
  background: var(--pink-bg);
  border-radius: var(--radius-sm);
  font-weight: 500;
}

/* Content: Shopping Items */
.content-items {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 16px;
}

.content-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  background: #FFFBFD;
  border-radius: var(--radius-sm);
  border: 1px solid #FEE4EC;
}

.item-emoji {
  font-size: 28px;
  flex-shrink: 0;
}

.item-info {
  flex: 1;
}

.item-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}

.item-note {
  font-size: 12px;
  color: var(--text-light);
  margin-top: 2px;
}

/* 快递状态 */
.item-status-badge {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 10px;
  flex-shrink: 0;
}
.status-delivered { background: #E8F5E9; color: #2E7D32; }
.status-transit   { background: #FFF3E0; color: #E65100; }
.status-pending   { background: #F5F5F5; color: #9E9E9E; }

.item-blurred .item-name,
.item-blurred .item-note {
  filter: blur(6px);
  user-select: none;
}
.item-blurred .item-emoji {
  filter: blur(8px) grayscale(0.5);
}

/* Content: Editable Table */
.content-table-wrap {
  margin-bottom: 16px;
  overflow-x: auto;
}
.content-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.content-table th {
  background: var(--pink-light);
  color: var(--text);
  padding: 8px 10px;
  font-weight: 600;
  font-size: 12px;
  text-align: left;
  border-radius: 4px 4px 0 0;
}
.content-table td {
  padding: 6px 4px;
  border-bottom: 1px solid #FEE4EC;
}
.content-table input {
  width: 100%;
  border: 1px solid #F0E4EA;
  border-radius: 6px;
  padding: 7px 8px;
  font-size: 13px;
  font-family: inherit;
  background: #FFFBFD;
  color: var(--text);
  outline: none;
  transition: border 0.2s;
  box-sizing: border-box;
}
.content-table input:focus {
  border-color: var(--pink);
  background: white;
}
.content-table input::placeholder {
  color: #D4BCC8;
  font-size: 12px;
}
.table-add-btn {
  display: block;
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border: 2px dashed var(--pink-light);
  border-radius: 10px;
  background: transparent;
  color: var(--pink);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.table-add-btn:hover {
  background: var(--pink-bg);
  border-color: var(--pink);
}
.table-delete-btn {
  background: none;
  border: none;
  font-size: 16px;
  cursor: pointer;
  padding: 2px 6px;
  opacity: 0.4;
  transition: opacity 0.2s;
}
.table-delete-btn:hover { opacity: 1; }

.dessert-map-canvas {
  display: none;
}
.dessert-map-wrap {
  width: 100%;
  max-width: 360px;
  margin: 12px auto 0;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(255,126,179,0.1);
}
.dessert-map {
  width: 100%;
  height: 260px;
  background: #f5f0eb;
}

/* Autocomplete dropdown */
.autocomplete-wrap { position: relative; }
.autocomplete-dropdown {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  max-height: 180px;
  overflow-y: auto;
  background: #fff;
  border: 1px solid var(--pink-light);
  border-radius: 8px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  z-index: 50;
  display: none;
  font-size: 12px;
}
.autocomplete-dropdown.show { display: block; }
.autocomplete-item {
  padding: 8px 10px;
  cursor: pointer;
  border-bottom: 1px solid #FEE4EC;
  line-height: 1.4;
}
.autocomplete-item:last-child { border-bottom: none; }
.autocomplete-item:hover { background: var(--pink-bg); }
.autocomplete-item .ac-name { font-weight: 600; color: var(--text); }
.autocomplete-item .ac-addr { font-size: 11px; color: var(--text-light); }
.autocomplete-loading {
  padding: 8px 10px;
  color: var(--text-light);
  font-size: 12px;
  text-align: center;
}

/* Content: Dessert Tour */
.content-stops {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 16px;
}

.stop-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px;
  background: #FFFBFD;
  border-radius: var(--radius-sm);
  border: 1px solid #FEE4EC;
  position: relative;
}

.stop-number {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--pink);
  color: white;
  font-size: 13px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.stop-emoji {
  font-size: 28px;
  flex-shrink: 0;
}

.stop-info {
  flex: 1;
  min-width: 0;
}

.stop-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}

.stop-area {
  font-size: 12px;
  color: var(--text-light);
}

.stop-musttry {
  font-size: 12px;
  color: var(--pink);
  margin-top: 2px;
  font-weight: 500;
}

/* Content: Detail Cards */
.content-detail-cards {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 16px;
}

.detail-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  background: #FFFBFD;
  border-radius: var(--radius-sm);
  border: 1px solid #FEE4EC;
}

.detail-emoji { font-size: 24px; flex-shrink: 0; }
.detail-label { font-size: 13px; color: var(--text-light); flex-shrink: 0; min-width: 36px; }
.detail-value { font-size: 14px; font-weight: 600; color: var(--text); }

/* Content: Menu */
.content-menu {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 16px;
}

.menu-course {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  background: #FFFBFD;
  border-radius: var(--radius-sm);
  border: 1px solid #FEE4EC;
}

.menu-emoji { font-size: 28px; flex-shrink: 0; }
.menu-course-name { font-size: 12px; color: var(--text-light); font-weight: 600; text-transform: uppercase; min-width: 36px; }
.menu-dishes { font-size: 14px; font-weight: 500; color: var(--text); }

/* Content Closing */
.content-closing {
  text-align: center;
  font-size: 15px;
  font-weight: 600;
  color: var(--pink);
  padding: 12px;
  background: linear-gradient(135deg, #FFF0F3, #FFF5F7);
  border-radius: var(--radius-sm);
  margin-bottom: 4px;
}

.content-mapnote {
  text-align: center;
  font-size: 12px;
  color: var(--text-light);
  margin-top: 4px;
  font-style: italic;
}

.content-winenote {
  text-align: center;
  font-size: 13px;
  color: var(--text-light);
  margin-top: 8px;
}

/* Separator between cards */
.card-separator {
  display: none;
  align-items: center;
  gap: 8px;
  justify-content: center;
  padding: 4px 0;
}

.card-separator .sep-line {
  width: 40px;
  height: 1px;
  background: var(--pink-light);
}

.card-separator .sep-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--pink);
}

/* ========== Final Message ========== */
.final-message {
  text-align: center;
  padding: 36px 20px;
  animation: fadeInUp 0.8s ease-out;
}

.final-heart {
  font-size: 48px;
  display: block;
  animation: float 2.5s ease-in-out infinite;
}

.final-text {
  font-size: 17px;
  font-weight: 600;
  color: var(--text);
  margin-top: 12px;
  line-height: 1.6;
  white-space: pre-line;
}

/* ========== Admin Panel ========== */
.admin-panel {
  display: none;
  position: fixed;
  bottom: 70px;
  right: 20px;
  background: white;
  border-radius: var(--radius);
  box-shadow: 0 8px 40px rgba(0,0,0,0.15);
  padding: 20px;
  z-index: 101;
  width: 280px;
  max-height: 60vh;
  overflow-y: auto;
  font-size: 13px;
}

.admin-panel.visible { display: block; }

.admin-panel h3 {
  font-size: 15px;
  margin-bottom: 12px;
  color: var(--text);
}

.admin-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid #FEE4EC;
}

.admin-item-name { font-weight: 500; font-size: 13px; }

.admin-toggle {
  padding: 6px 14px;
  border-radius: 20px;
  border: none;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.admin-toggle.locked-btn {
  background: #F0E4EA;
  color: #8B6F7C;
}

.admin-toggle.unlocked-btn {
  background: var(--pink);
  color: white;
}

.admin-hint {
  font-size: 11px;
  color: var(--text-light);
  margin-top: 12px;
  text-align: center;
}

.admin-close {
  display: block;
  margin: 10px auto 0;
  padding: 6px 20px;
  background: #f0f0f0;
  border: none;
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
}

/* ========== Confetti Canvas ========== */
#confetti-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 200;
}

/* ========== Animations ========== */
@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

@keyframes gentlePulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.15); }
}

@keyframes pulseGlow {
  0%, 100% { box-shadow: 0 0 0 2px var(--gold), var(--shadow-lg); }
  50% { box-shadow: 0 0 0 6px rgba(255,179,71,0.25), var(--shadow-lg); }
}

@keyframes unlockPop {
  0% { transform: scale(1); }
  30% { transform: scale(1.04); }
  60% { transform: scale(0.98); }
  100% { transform: scale(1); }
}

@keyframes openGift {
  0% { transform: scale(1) rotate(0); }
  25% { transform: scale(1.3) rotate(-5deg); }
  50% { transform: scale(1.2) rotate(5deg); }
  75% { transform: scale(1.1) rotate(-3deg); }
  100% { transform: scale(1) rotate(0); }
}

.opening-animation .unopened-emoji {
  animation: openGift 0.6s ease-out;
}

/* ========== Responsive ========== */
@media (max-width: 360px) {
  .hero-emoji { font-size: 48px; }
  .hero-title { font-size: 24px; }
  .card-title { font-size: 15px; }
  .card-icon-wrap { width: 44px; height: 44px; font-size: 24px; border-radius: 14px; }
  .card-header { padding: 16px; gap: 10px; }
  .card-content-inner { padding: 0 16px 16px; }
}
</style>
</head>
<body>

<!-- 粒子背景 -->
<canvas id="particles-canvas"></canvas>

<!-- 彩纸画布 -->
<canvas id="confetti-canvas"></canvas>

<!-- 主容器 -->
<div class="main-container">

  <!-- Hero -->
  <section class="hero">
    <span class="hero-emoji">🎂</span>
    <h1 class="hero-title">生日快乐，小可爱！</h1>
    <p class="hero-subtitle">我为你准备了一整天的惊喜旅程<br>每解锁一站，就离快乐更近一步 💕</p>
  </section>

  <!-- 生日倒计时 -->
  <div class="countdown-section">
    <div class="countdown-label">🕯️ 距离你的生日还有</div>
    <div class="countdown-row">
      <div class="countdown-unit">
        <div class="countdown-num" id="cd-days">00</div>
        <div class="countdown-unit-label">天</div>
      </div>
      <div class="countdown-separator">:</div>
      <div class="countdown-unit">
        <div class="countdown-num" id="cd-hours">00</div>
        <div class="countdown-unit-label">时</div>
      </div>
      <div class="countdown-separator">:</div>
      <div class="countdown-unit">
        <div class="countdown-num" id="cd-mins">00</div>
        <div class="countdown-unit-label">分</div>
      </div>
      <div class="countdown-separator">:</div>
      <div class="countdown-unit">
        <div class="countdown-num" id="cd-secs">00</div>
        <div class="countdown-unit-label">秒</div>
      </div>
    </div>
  </div>

  <!-- 进度条 -->
  <div class="progress-section">
    <div class="progress-header">
      <span>🎀 惊喜解锁进度</span>
      <span class="progress-stats" id="progress-stats">0/5</span>
    </div>
    <div class="progress-bar-outer">
      <div class="progress-bar-inner" id="progress-bar"></div>
    </div>

  <!-- 活动卡片 -->
  <div class="activities" id="activities-container">
    <!-- JS 动态渲染 -->

    <span class="final-heart">💕</span>
    <p class="final-text">所有的惊喜，都是因为喜欢你 ❤️<br>生日快乐，每一天都要快乐。</p>

</div>

<!-- 管理面板（长按蛋糕 emoji 3秒 或 URL 加 ?admin 打开） -->
<div class="admin-panel" id="admin-panel">
  <h3>🔧 后台控制面板</h3>
  <div id="admin-items"></div>
  <p class="admin-hint">⚠️ 手动解锁仅本设备生效<br>自动解锁到时间对所有设备生效</p>
  <button class="admin-close" id="admin-close">关闭</button>
</div>

<script>
// ==================== 主逻辑 ====================

const CONFIG_URL = 'config.json';
const PARTICLES_COUNT = 25;
const CONFETTI_DURATION = 3000;

let activities = [];
let config = null;
let newlyUnlockedIds = new Set();

// ==================== 粒子背景 ====================
(function initParticles() {
  const canvas = document.getElementById('particles-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let animId;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const emojis = ['💕', '✨', '🌸', '💖', '🩷', '🎀', '💝', '🌟'];

  // 普通粒子
  for (let i = 0; i < PARTICLES_COUNT; i++) {
    particles.push({
      type: 'particle',
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: 12 + Math.random() * 14,
      speedY: 0.3 + Math.random() * 0.7,
      speedX: (Math.random() - 0.5) * 0.5,
      emoji: emojis[Math.floor(Math.random() * emojis.length)],
      wobble: Math.random() * Math.PI * 2,
      wobbleSpeed: 0.01 + Math.random() * 0.03,
      opacity: 0.4 + Math.random() * 0.4
    });
  }

  // 🐖 飞猪
  let flyingPig = {
    emoji: '🐖', name: 'pig',
    x: canvas.width * 0.2, y: canvas.height * 0.4,
    size: 40,
    speedX: 0.7, speedY: 0.3,
    phase: 0, trail: []
  };

  // 🐕 飞狗
  let flyingDog = {
    emoji: '🐕', name: 'dog',
    x: canvas.width * 0.7, y: canvas.height * 0.55,
    size: 40,
    speedX: -0.55, speedY: -0.25,
    phase: 2.5, trail: []
  };

  // 彩蛋状态
  let easterEgg = { active: false, timer: 0, hearts: [] };

  function updateCreature(c) {
    c.phase += 0.018;
    c.x += c.speedX;
    c.y += Math.sin(c.phase) * 1.0 + c.speedY * 0.4;

    // 边界反弹 + 随机微调方向
    if (c.x > canvas.width + 50) { c.x = -50; c.y = Math.random() * canvas.height * 0.6 + canvas.height * 0.15; }
    if (c.x < -50) { c.x = canvas.width + 50; }
    if (c.y > canvas.height * 0.88) { c.speedY = -Math.abs(c.speedY) - 0.1; }
    if (c.y < canvas.height * 0.08) { c.speedY = Math.abs(c.speedY) + 0.1; }

    // 尾迹
    c.trail.push({ x: c.x, y: c.y, life: 1 });
    if (c.trail.length > 14) c.trail.shift();
    c.trail.forEach(t => t.life -= 0.07);
  }

  function drawCreature(ctx, c) {
    // 尾迹
    c.trail.forEach(t => {
      if (t.life > 0) {
        ctx.globalAlpha = t.life * 0.2;
        ctx.font = '12px serif';
        ctx.fillText('💨', t.x - 16, t.y + 2);
      }
    });

    // 身体
    ctx.globalAlpha = 0.75;
    ctx.font = `${c.size}px serif`;
    const facingRight = c.speedX > 0;
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.scale(facingRight ? 1 : -1, 1);
    ctx.fillText(c.emoji, -c.size / 2, c.size / 2);

    // 双翼
    ctx.globalAlpha = 0.6;
    ctx.font = `${c.size * 0.55}px serif`;
    const wingFlap = Math.sin(c.phase * 4) * 4;
    ctx.fillText('🪽', -c.size * 0.55, -c.size * 0.25 + wingFlap);   // 左翼
    ctx.fillText('🪽', c.size * 0.05, -c.size * 0.25 - wingFlap);    // 右翼

    // 头顶闪光
    ctx.globalAlpha = 0.45 + Math.sin(c.phase * 3) * 0.15;
    ctx.font = '14px serif';
    ctx.fillText('✨', -c.size * 0.1, -c.size * 0.55);
    ctx.restore();
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    updateCreature(flyingPig);
    updateCreature(flyingDog);

    // 距离检测
    const dx = flyingPig.x - flyingDog.x;
    const dy = flyingPig.y - flyingDog.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const closeEnough = dist < 120;

    // 彩蛋触发
    if (closeEnough && !easterEgg.active) {
      easterEgg.active = true;
      easterEgg.timer = 90; // ~1.5 秒
      // 爆爱心
      for (let i = 0; i < 20; i++) {
        easterEgg.hearts.push({
          x: (flyingPig.x + flyingDog.x) / 2,
          y: (flyingPig.y + flyingDog.y) / 2,
          vx: (Math.random() - 0.5) * 4,
          vy: (Math.random() - 0.5) * 4 - 1.5,
          life: 1,
          emoji: ['💕', '❤️', '💖', '💗', '💝', '✨'][Math.floor(Math.random() * 6)]
        });
      }
      // 互相弹开
      const nx = dx / (dist || 1), ny = dy / (dist || 1);
      flyingPig.speedX += nx * 1.5;
      flyingPig.speedY += ny * 1.5;
      flyingDog.speedX -= nx * 1.5;
      flyingDog.speedY -= ny * 1.5;
    }

    if (easterEgg.active) {
      easterEgg.timer--;
      easterEgg.hearts.forEach(h => {
        h.x += h.vx;
        h.y += h.vy;
        h.vy += 0.03; // 微重力
        h.life -= 0.015;
      });
      easterEgg.hearts = easterEgg.hearts.filter(h => h.life > 0);
      if (easterEgg.timer <= 0 && easterEgg.hearts.length === 0) {
        easterEgg.active = false;
      }
    }

    // 画彩蛋爱心
    easterEgg.hearts.forEach(h => {
      ctx.globalAlpha = h.life * 0.9;
      ctx.font = `${16 + (1 - h.life) * 14}px serif`;
      ctx.fillText(h.emoji, h.x, h.y);
    });

    // 靠近时画连接线（虚线爱心）
    if (closeEnough) {
      ctx.globalAlpha = 0.25;
      const mx = (flyingPig.x + flyingDog.x) / 2;
      const my = (flyingPig.y + flyingDog.y) / 2;
      ctx.font = '22px serif';
      ctx.fillText('💫', mx - 11, my - 20);
    }

    // 画两只生物
    drawCreature(ctx, flyingPig);
    drawCreature(ctx, flyingDog);

    // 画普通粒子
    particles.forEach(p => {
      if (p.type !== 'particle') return;
      p.y -= p.speedY;
      p.x += Math.sin(p.wobble) * p.speedX;
      p.wobble += p.wobbleSpeed;
      if (p.y < -40) { p.y = canvas.height + 40; p.x = Math.random() * canvas.width; }
      if (p.x < -20) p.x = canvas.width + 20;
      if (p.x > canvas.width + 20) p.x = -20;
      ctx.globalAlpha = p.opacity;
      ctx.font = `${p.size}px serif`;
      ctx.fillText(p.emoji, p.x, p.y);
    });
    ctx.globalAlpha = 1;
    animId = requestAnimationFrame(animate);
  }
  animate();
})();

// ==================== 彩纸特效 ====================
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const colors = ['#FF7EB3','#FFB347','#FF6B8A','#FFD4E0','#FF9A56','#43B7B8','#D4494B','#7B4FBF'];
  const shapes = ['❤️','✨','🎉','🌟','💖','🎀'];
  let pieces = [];
  const startTime = Date.now();

  for (let i = 0; i < 80; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: -20 - Math.random() * canvas.height * 0.5,
      size: 10 + Math.random() * 20,
      speedY: 1.5 + Math.random() * 4,
      speedX: (Math.random() - 0.5) * 3,
      rotation: Math.random() * 360,
      rotationSpeed: (Math.random() - 0.5) * 8,
      color: colors[Math.floor(Math.random() * colors.length)],
      shape: shapes[Math.floor(Math.random() * shapes.length)],
      opacity: 1
    });
  }

  function animateConfetti() {
    const elapsed = Date.now() - startTime;
    if (elapsed > CONFETTI_DURATION) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      return;
    }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      p.y += p.speedY;
      p.x += p.speedX;
      p.rotation += p.rotationSpeed;
      p.speedY += 0.03;
      if (elapsed > CONFETTI_DURATION * 0.7) {
        p.opacity = Math.max(0, 1 - (elapsed - CONFETTI_DURATION * 0.7) / (CONFETTI_DURATION * 0.3));
      }
      ctx.save();
      ctx.globalAlpha = p.opacity;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation * Math.PI / 180);
      ctx.font = `${p.size}px serif`;
      ctx.fillText(p.shape, -p.size/2, p.size/2);
      ctx.restore();
    });
    requestAnimationFrame(animateConfetti);
  }
  animateConfetti();
}

// ==================== 主初始化 ====================
async function init() {
  try {
    const resp = await fetch(CONFIG_URL);
    config = await resp.json();
  } catch (e) {
    console.warn('无法加载 config.json，使用默认配置');
    config = getDefaultConfig();
  }

  // 读取本地存储的"已拆开"状态
  const openedIds = JSON.parse(localStorage.getItem('birthday-opened') || '[]');

  // 读取手动覆盖（来自管理面板的操作，跨会话保持）
  const manualOverrides = JSON.parse(localStorage.getItem('birthday-manual-overrides') || '{}');

  // 读取 hash 中的手动解锁覆盖（用于分享链接场景）
  let hashOverrides = {};
  try {
    const hash = window.location.hash.slice(1);
    if (hash) {
      hashOverrides = JSON.parse(decodeURIComponent(atob(hash)));
    }
  } catch (e) { /* ignore */ }

  const now = new Date();

  activities = config.activities.map(act => {
    const hashUnlocked = hashOverrides[act.id] === true;
    const forceUnlocked = act.forceUnlocked === true;
    const manualUnlocked = manualOverrides[act.id] === true;
    const timeUnlocked = now >= new Date(act.unlockTime);
    const isUnlocked = hashUnlocked || forceUnlocked || manualUnlocked || timeUnlocked;
    const isOpened = openedIds.includes(act.id);

    return {
      ...act,
      isUnlocked,
      isOpened,
      _manualOverride: manualUnlocked,
      state: isUnlocked ? (isOpened ? 'unlocked-opened' : 'unlocked-unopened') : 'locked'
    };
  });

  renderAll();
  startCountdownTimers();
  startBirthdayCountdown();
  updateProgress();

  // URL 参数 ?admin 自动打开管理面板
  if (window.location.search.includes('admin')) {
    document.getElementById('admin-panel').classList.add('visible');
    renderAdminPanel();
  }

  // 检查是否有全新解锁的（之前锁着，现在解锁且未拆）
  // 从 sessionStorage 记录已知的已解锁 ID
  const knownUnlocked = JSON.parse(sessionStorage.getItem('birthday-known-unlocked') || '[]');
  activities.forEach(act => {
    if (act.isUnlocked && !act.isOpened && !knownUnlocked.includes(act.id)) {
      newlyUnlockedIds.add(act.id);
    }
  });
  sessionStorage.setItem('birthday-known-unlocked', JSON.stringify(
    activities.filter(a => a.isUnlocked).map(a => a.id)
  ));
}

function getDefaultConfig() {
  return {
    heroMessage: '🎂 生日快乐，我的小可爱！\n我为你准备了一整天的惊喜旅程，\n每解锁一站，就离快乐更近一步 💕',
    finalMessage: '所有的惊喜，都是因为喜欢你 ❤️\n生日快乐，每一天都要快乐。',
    activities: []
  };
}

// ==================== 渲染 ====================
function renderAll() {
  // Hero
  if (config.heroTitle) {
    document.querySelector('.hero-title').textContent = config.heroTitle;
  }
  if (config.heroMessage) {
    document.querySelector('.hero-subtitle').textContent = config.heroMessage;
  }

  // Cards
  const container = document.getElementById('activities-container');
  container.innerHTML = '';

  activities.forEach((act, index) => {
    const card = document.createElement('div');
    card.className = `card ${act.state}`;
    card.id = `card-${act.id}`;

    if (newlyUnlockedIds.has(act.id)) {
      card.classList.add('newly-unlocked');
    }

    // Color mapping for locked vs unlocked
    const iconBgColor = act.state === 'locked' ? '#F0E4EA' : act.color;
    const iconColor = act.state === 'locked' ? '#C4A6B5' : act.color;

    card.innerHTML = `
      <!-- 未拆封遮罩 -->
      ${act.state === 'unlocked-unopened' ? `
        <div class="unopened-overlay" data-action="open" data-id="${act.id}">
          <span class="unopened-emoji">🎁</span>
          <span class="unopened-text">有惊喜！点我拆开</span>
          <span class="unopened-hint">👆 轻点礼物盒</span>
        </div>
      ` : '<div class="unopened-overlay" style="display:none;"></div>'}

      <!-- 卡片头部 -->
      <div class="card-header" data-action="${act.state === 'unlocked-unopened' ? 'open' : ''}" data-id="${act.id}">
        <div class="card-icon-wrap" style="background:${iconBgColor};">
          ${act.icon}
        </div>
        <div class="card-info">
          <div class="card-title">${act.title}</div>
          <div class="card-subtitle">${act.subtitle}</div>
          ${act.state === 'locked' ? `<div class="countdown" id="countdown-${act.id}">计算中...</div>` : ''}
        </div>
        <div class="card-status-icon">
          ${act.state === 'locked' ? '🔒' : (act.state === 'unlocked-unopened' ? '🔓' : '✨')}
        </div>
      </div>

      <!-- 展开内容 -->
      <div class="card-content">
        <div class="card-content-inner">
          ${renderContent(act)}
        </div>
      </div>
    `;

    container.appendChild(card);
  });

  // 绑定事件
  container.querySelectorAll('[data-action="open"]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = el.dataset.id;
      openCard(id);
    });
  });

  // 更新最终消息
  const finalMsg = document.getElementById('final-message');
  const allOpened = activities.every(a => a.state === 'unlocked-opened');
  if (allOpened) {
    finalMsg.style.display = 'block';
    finalMsg.querySelector('.final-text').textContent = config.finalMessage || '所有的惊喜，都是因为喜欢你 ❤️';
  }

  // 更新管理面板
  renderAdminPanel();

  // 绑定可编辑表格事件
  bindTableEvents();
}

function renderContent(act) {
  const c = act.content || {};
  let html = '';

  if (c.heroEmoji) {
    html += `<span class="content-hero">${c.heroEmoji}</span>`;
  }
  if (c.summary) {
    html += `<div class="content-summary">${c.summary}</div>`;
  }

  // 购物清单（支持快递状态）
  if (c.items && c.items.length > 0) {
    html += '<div class="content-items">';
    c.items.forEach(item => {
      const status = item.status || '';
      const isDelivered = status === '已到小笨家';
      const isTransit = status === '运输中';
      const blurClass = isDelivered ? '' : 'item-blurred';

      let badgeHtml = '';
      if (status === '已到小笨家') {
        badgeHtml = '<span class="item-status-badge status-delivered">已到小笨家 ✅</span>';
      } else if (status === '运输中') {
        badgeHtml = '<span class="item-status-badge status-transit">运输中 🚚</span>';
      } else if (status === '未发货') {
        badgeHtml = '<span class="item-status-badge status-pending">待发货 📦</span>';
      }

      html += `
        <div class="content-item ${blurClass}">
          <span class="item-emoji">${item.emoji || '🎁'}</span>
          <div class="item-info">
            <div class="item-name">${isDelivered ? item.name : (isTransit ? '运输中…' : '待签收…')}</div>
            ${isDelivered && item.note ? `<div class="item-note">${item.note}</div>` : ''}
          </div>
          ${badgeHtml}
        </div>
      `;
    });
    html += '</div>';
  }

  // 可编辑表格（甜品逛吃）
  if (c.table) {
    html += renderEditableTable(c.table);
  }

  // 甜品站 (legacy)
  if (c.stops && c.stops.length > 0) {
    html += '<div class="content-stops">';
    c.stops.forEach((stop, i) => {
      html += `
        <div class="stop-card">
          <span class="stop-number">${i + 1}</span>
          <span class="stop-emoji">${stop.emoji || '🍰'}</span>
          <div class="stop-info">
            <div class="stop-name">${stop.name}</div>
            <div class="stop-area">${stop.area}</div>
            <div class="stop-musttry">必点：${stop.mustTry}</div>
          </div>
        </div>
      `;
    });
    html += '</div>';
    if (c.mapNote) {
      html += `<div class="content-mapnote">${c.mapNote}</div>`;
    }
  }

  // 详情卡片 (攀岩 / 音乐会)
  if (c.details && c.details.length > 0) {
    html += '<div class="content-detail-cards">';
    c.details.forEach(d => {
      html += `
        <div class="detail-card">
          <span class="detail-emoji">${d.emoji || '📍'}</span>
          <span class="detail-label">${d.label}</span>
          <span class="detail-value">${d.value}</span>
        </div>
      `;
    });
    html += '</div>';
  }

  // 菜单 (西班牙晚餐)
  if (c.menu && c.menu.length > 0) {
    html += '<div class="content-menu">';
    c.menu.forEach(m => {
      html += `
        <div class="menu-course">
          <span class="menu-emoji">${m.emoji || '🍽️'}</span>
          <span class="menu-course-name">${m.course}</span>
          <span class="menu-dishes">${m.dishes}</span>
        </div>
      `;
    });
    html += '</div>';
    if (c.wineNote) {
      html += `<div class="content-winenote">${c.wineNote}</div>`;
    }
  }

  if (c.closingLine) {
    html += `<div class="content-closing">${c.closingLine}</div>`;
  }

  return html;
}

// ==================== 可编辑表格 ====================
function getTableData(tableId) {
  try {
    return JSON.parse(localStorage.getItem(`table-${tableId}`)) || [];
  } catch(e) { return []; }
}

function saveTableData(tableId, rows) {
  localStorage.setItem(`table-${tableId}`, JSON.stringify(rows));
}

function renderEditableTable(tableCfg) {
  const tableId = tableCfg.placeholder || 'table';
  const rows = getTableData(tableId);
  const cols = tableCfg.columns || ['店名', '品类', '评价'];

  // 确保至少有一行空行
  if (rows.length === 0) {
    rows.push(cols.map(() => ''));
  }

  let html = '<div class="content-table-wrap"><table class="content-table"><thead><tr>';
  cols.forEach(col => { html += `<th>${col}</th>`; });
  html += '<th style="width:30px;"></th></tr></thead><tbody>';

  rows.forEach((row, ri) => {
    html += '<tr>';
    cols.forEach((col, ci) => {
      if (ci === 0) {
        // 店名列：带搜索自动补全
        html += `<td class="autocomplete-wrap"><input type="text" placeholder="${col}" value="${escapeHtml(row[ci] || '')}" data-table="${escapeHtml(tableId)}" data-row="${ri}" data-col="${ci}" class="ac-input" autocomplete="off"><div class="autocomplete-dropdown" data-table="${escapeHtml(tableId)}" data-row="${ri}"></div></td>`;
      } else {
        html += `<td><input type="text" placeholder="${col}" value="${escapeHtml(row[ci] || '')}" data-table="${escapeHtml(tableId)}" data-row="${ri}" data-col="${ci}"></td>`;
      }
    });
    html += `<td><button class="table-delete-btn" data-table="${escapeHtml(tableId)}" data-row="${ri}" title="删除">✕</button></td>`;
    html += '</tr>';
  });

  html += '</tbody></table>';
  html += `<button class="table-add-btn" data-table="${escapeHtml(tableId)}">${tableCfg.addLabel || '➕ 添加一行'}</button>`;
  html += '</div>';

  // 真实地图
  html += `<div class="dessert-map-wrap"><div class="dessert-map" id="map-${escapeHtml(tableId)}"></div></div>`;

  // 初始化地图
  setTimeout(() => initDessertMap(tableId), 300);

  return html;
}

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// 绑定表格事件（在 renderAll 后调用）
function bindTableEvents() {
  // 输入变化
  document.querySelectorAll('.content-table input').forEach(input => {
    input.addEventListener('change', () => {
      const tableId = input.dataset.table;
      const ri = parseInt(input.dataset.row);
      const ci = parseInt(input.dataset.col);
      const rows = getTableData(tableId);
      if (!rows[ri]) rows[ri] = [];
      rows[ri][ci] = input.value;
      // 清理空尾行
      while (rows.length > 1 && rows[rows.length-1].every(c => !c)) rows.pop();
      saveTableData(tableId, rows);
      initDessertMap(tableId);
    });
  });

  // 删除行
  document.querySelectorAll('.table-delete-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const tableId = btn.dataset.table;
      const ri = parseInt(btn.dataset.row);
      const rows = getTableData(tableId);
      if (rows.length <= 1) return; // 保留至少一行
      rows.splice(ri, 1);
      saveTableData(tableId, rows);
      initDessertMap(tableId);
      // 局部刷新表格
      const card = btn.closest('.card');
      const actId = card ? card.id.replace('card-', '') : null;
      if (actId) {
        const act = activities.find(a => a.id === actId);
        if (act) {
          const tableWrap = card.querySelector('.content-table-wrap');
          if (tableWrap) {
            tableWrap.outerHTML = renderEditableTable(act.content.table);
            bindTableEvents();
          }
        }
      }
    });
  });

  // 添加行
  document.querySelectorAll('.table-add-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const tableId = btn.dataset.table;
      const rows = getTableData(tableId);
      rows.push([]);
      saveTableData(tableId, rows);
      initDessertMap(tableId);
      const card = btn.closest('.card');
      const actId = card ? card.id.replace('card-', '') : null;
      if (actId) {
        const act = activities.find(a => a.id === actId);
        if (act) {
          const tableWrap = card.querySelector('.content-table-wrap');
          if (tableWrap) {
            tableWrap.outerHTML = renderEditableTable(act.content.table);
            bindTableEvents();
          }
        }
      }
    });
  });
}

// ==================== 真实地图路线 ====================
let dessertMaps = {};
let dessertPins = {}; // { tableId: [{lat, lng, name}] }

async function initDessertMap(tableId) {
  const container = document.getElementById(`map-${tableId}`);
  if (!container) return;

  if (dessertMaps[tableId]) {
    dessertMaps[tableId].remove();
    delete dessertMaps[tableId];
  }

  const map = L.map(container, { tap: true }).setView([31.2304, 121.4737], 13);
  dessertMaps[tableId] = map;

  L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
    subdomains: '1234',
    maxZoom: 18
  }).addTo(map);

  // 读取已保存的标记
  const saved = JSON.parse(localStorage.getItem(`pins-${tableId}`) || '[]');
  dessertPins[tableId] = saved;

  const colors = ['#FF7EB3','#FF9A56','#43B7B8','#D4494B','#7B4FBF','#FFB347','#FF6B8A'];

  function redrawPins() {
    // 清除旧标记层
    map.eachLayer(layer => { if (layer instanceof L.Marker || layer instanceof L.Polyline) map.removeLayer(layer); });

    const pins = dessertPins[tableId] || [];
    const latlngs = [];
    pins.forEach((pin, idx) => {
      latlngs.push([pin.lat, pin.lng]);
      const color = colors[idx % colors.length];
      const icon = L.divIcon({
        className: 'dessert-marker',
        html: `<div style="background:${color};width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,0.2);border:2px solid #fff">${idx+1}</div>`,
        iconSize: [28, 28], iconAnchor: [14, 14]
      });
      const m = L.marker([pin.lat, pin.lng], { icon }).addTo(map);
      m.bindPopup(`<b>${pin.name}</b><br>第${idx+1}站 🍰<br><a href="#" onclick="deleteDessertPin('${tableId}',${idx});return false;" style="color:#D4494B;font-size:11px;">删除此标记</a>`);
    });

    if (latlngs.length > 1) {
      L.polyline(latlngs, { color: '#FF7EB3', weight: 3, dashArray: '8 6', opacity: 0.8 }).addTo(map);
    }
  }

  // 点击地图放标记
  map.on('click', (e) => {
    const name = prompt('🍰 这家甜品店叫什么名字？');
    if (!name || !name.trim()) return;
    dessertPins[tableId].push({ lat: e.latlng.lat, lng: e.latlng.lng, name: name.trim() });
    localStorage.setItem(`pins-${tableId}`, JSON.stringify(dessertPins[tableId]));
    redrawPins();
    // 同步到表格
    syncPinsToTable(tableId);
    // 删除提示文字
    const hint = container.querySelector('div');
    if (hint && hint.textContent.includes('点击地图')) hint.remove();
  });

  redrawPins();

  // 首次显示提示
  if (dessertPins[tableId].length === 0) {
    const hint = document.createElement('div');
    hint.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#D4BCC8;font-size:13px;text-align:center;z-index:1000;pointer-events:none;background:rgba(255,255,255,0.85);padding:8px 14px;border-radius:10px';
    hint.textContent = '👆 点击地图标记你的甜品店位置';
    container.appendChild(hint);
  }
}

function deleteDessertPin(tableId, idx) {
  dessertPins[tableId].splice(idx, 1);
  localStorage.setItem(`pins-${tableId}`, JSON.stringify(dessertPins[tableId]));
  syncPinsToTable(tableId);
  initDessertMap(tableId);
}

function syncPinsToTable(tableId) {
  const pins = dessertPins[tableId] || [];
  const rows = pins.map(p => [p.name, '', '']);
  if (rows.length === 0) rows.push(['', '', '']);
  saveTableData(tableId, rows);
  // 刷新表格 DOM
  const card = document.querySelector(`.dessert-map[id="map-${tableId}"]`)?.closest('.card');
  if (card) {
    const tableWrap = card.querySelector('.content-table-wrap');
    const actId = card.id.replace('card-', '');
    const act = activities.find(a => a.id === actId);
    if (act && tableWrap) {
      tableWrap.outerHTML = renderEditableTable(act.content.table);
      bindTableEvents();
    }
  }
}

function openCard(id) {
  const card = document.getElementById(`card-${id}`);
  if (!card || !card.classList.contains('unlocked-unopened')) return;

  // 播放开箱动画
  card.classList.add('opening-animation');
  launchConfetti();

  setTimeout(() => {
    // 状态更新
    card.classList.remove('unlocked-unopened', 'opening-animation');
    card.classList.add('unlocked-opened');

    // 隐藏礼物盒遮罩
    const overlay = card.querySelector('.unopened-overlay');
    if (overlay) overlay.style.display = 'none';

    // 更新锁图标
    const statusIcon = card.querySelector('.card-status-icon');
    if (statusIcon) statusIcon.textContent = '✨';

    // 展开内容区（移除最大高度限制）
    const content = card.querySelector('.card-content');
    if (content) content.style.maxHeight = content.scrollHeight + 'px';

    // 保存"已拆开"状态
    const openedIds = JSON.parse(localStorage.getItem('birthday-opened') || '[]');
    if (!openedIds.includes(id)) {
      openedIds.push(id);
      localStorage.setItem('birthday-opened', JSON.stringify(openedIds));
    }

    // 更新内存状态
    const act = activities.find(a => a.id === id);
    if (act) {
      act.state = 'unlocked-opened';
      act.isOpened = true;
      newlyUnlockedIds.delete(id);
    }

    // 更新进度条和面板（不重新渲染所有卡片）
    updateProgress();
    if (document.getElementById('admin-panel').classList.contains('visible')) {
      renderAdminPanel();
    }

    // 检查是否全部拆完
    const allOpened = activities.every(a => a.state === 'unlocked-opened');
    if (allOpened) {
      document.getElementById('final-message').style.display = 'block';
      setTimeout(() => launchConfetti(), 500);
    }
  }, 600);
}

// ==================== 生日倒计时 ====================
let birthdayCountdownTimer = null;

function startBirthdayCountdown() {
  const target = new Date(config.birthdayDate + 'T00:00:00');
  if (isNaN(target.getTime())) return;

  if (birthdayCountdownTimer) clearInterval(birthdayCountdownTimer);

  const update = () => {
    const now = new Date();
    const diff = target - now;

    if (diff <= 0) {
      document.querySelector('.countdown-label').textContent = '🎉 今天就是你的生日！';
      document.getElementById('cd-days').textContent = '🎂';
      document.getElementById('cd-hours').textContent = '🥳';
      document.getElementById('cd-mins').textContent = '💕';
      document.getElementById('cd-secs').textContent = '🎉';
      clearInterval(birthdayCountdownTimer);
      return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const secs = Math.floor((diff % (1000 * 60)) / 1000);

    document.getElementById('cd-days').textContent = String(days).padStart(2, '0');
    document.getElementById('cd-hours').textContent = String(hours).padStart(2, '0');
    document.getElementById('cd-mins').textContent = String(mins).padStart(2, '0');
    document.getElementById('cd-secs').textContent = String(secs).padStart(2, '0');
  };

  update();
  birthdayCountdownTimer = setInterval(update, 1000);
}

// ==================== 进度条 ====================
function updateProgress() {
  const unlocked = activities.filter(a => a.isUnlocked).length;
  const total = activities.length;
  const pct = total > 0 ? Math.round((unlocked / total) * 100) : 0;

  document.getElementById('progress-stats').textContent = `${unlocked}/${total}`;
  document.getElementById('progress-bar').style.width = `${pct}%`;

  // 最终消息
  const allOpened = activities.every(a => a.state === 'unlocked-opened');
  if (allOpened) {
    document.getElementById('final-message').style.display = 'block';
  }
}

// ==================== 倒计时 ====================
let countdownIntervals = [];

function startCountdownTimers() {
  countdownIntervals.forEach(clearInterval);
  countdownIntervals = [];

  activities.forEach(act => {
    if (act.state === 'locked') {
      const el = document.getElementById(`countdown-${act.id}`);
      if (!el) return;

      const update = () => {
        const now = new Date();
        const target = new Date(act.unlockTime);
        const diff = target - now;

        if (diff <= 0) {
          el.textContent = '即将解锁...';
          // 自动刷新
          setTimeout(() => {
            location.reload();
          }, 3000);
          return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((diff % (1000 * 60)) / 1000);

        if (days > 0) {
          el.textContent = `⏳ ${days}天${hours}时${minutes}分后解锁`;
        } else if (hours > 0) {
          el.textContent = `⏳ ${hours}时${minutes}分后解锁`;
        } else if (minutes > 0) {
          el.textContent = `⏳ ${minutes}分${seconds}秒后解锁`;
        } else {
          el.textContent = `⏳ ${seconds}秒后解锁`;
        }
      };

      update();
      const interval = setInterval(update, 1000);
      countdownIntervals.push(interval);
    }
  });
}

// ==================== 管理面板 ====================
function renderAdminPanel() {
  const container = document.getElementById('admin-items');
  container.innerHTML = '';

  activities.forEach(act => {
    const div = document.createElement('div');
    div.className = 'admin-item';
    const unlockedByTime = new Date() >= new Date(act.unlockTime);
    const unlockedByManual = act._manualOverride === true;
    div.innerHTML = `
      <span class="admin-item-name">${act.icon} ${act.title}</span>
      <div style="display:flex;gap:6px;align-items:center;">
        <span style="font-size:10px;color:var(--text-light);">${unlockedByTime ? '⏰已到' : '⏰未到'}</span>
        <button class="admin-toggle ${act.isUnlocked ? 'unlocked-btn' : 'locked-btn'}"
                data-id="${act.id}">
          ${act.isUnlocked ? '已解锁 ✓' : '锁定中'}
        </button>
      </div>
    `;
    container.appendChild(div);
  });

  // 绑定切换事件 - 直接修改状态，不刷新页面
  container.querySelectorAll('.admin-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const act = activities.find(a => a.id === id);
      if (!act) return;

      // 切换手动覆盖状态
      if (act.isUnlocked && !act._manualOverride) {
        // 时间解锁的不能重新锁定（只能手动锁手动解锁的）
        return;
      }

      if (act.isUnlocked) {
        // 重新锁定
        act.isUnlocked = false;
        act._manualOverride = false;
        act.isOpened = false;
        act.state = 'locked';
        // 从 opened 列表中移除
        const openedIds = JSON.parse(localStorage.getItem('birthday-opened') || '[]');
        const idx = openedIds.indexOf(id);
        if (idx >= 0) openedIds.splice(idx, 1);
        localStorage.setItem('birthday-opened', JSON.stringify(openedIds));
      } else {
        // 手动解锁
        act.isUnlocked = true;
        act._manualOverride = true;
        act.isOpened = false;
        act.state = 'unlocked-unopened';
        newlyUnlockedIds.add(id);
      }

      // 保存手动覆盖到 localStorage（跨会话保持）
      const manualOverrides = JSON.parse(localStorage.getItem('birthday-manual-overrides') || '{}');
      if (act.isUnlocked && act._manualOverride) {
        manualOverrides[id] = true;
      } else {
        delete manualOverrides[id];
      }
      localStorage.setItem('birthday-manual-overrides', JSON.stringify(manualOverrides));

      renderAll();
      updateProgress();
      startCountdownTimers();
      renderAdminPanel();
    });
  });
}

function isTimeUnlocked(act) {
  return new Date() >= new Date(act.unlockTime);
}

// 管理面板显示/隐藏：长按蛋糕 🎂 5 秒 + 再点一下，或 URL 加 ?admin
let adminLongPressTimer = null;
let adminPrimed = false;
let adminPrimeTimer = null;

function openAdminPanel() {
  const panel = document.getElementById('admin-panel');
  panel.classList.add('visible');
  renderAdminPanel();
  if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
  adminPrimed = false;
  clearTimeout(adminPrimeTimer);
}

function primeAdmin() {
  adminPrimed = true;
  if (navigator.vibrate) navigator.vibrate(20);
  // 3 秒内不点击则重置
  clearTimeout(adminPrimeTimer);
  adminPrimeTimer = setTimeout(() => { adminPrimed = false; }, 3000);
}

// 触屏：长按 5 秒 → 松手 prime → 再点一下打开
document.querySelector('.hero-emoji').addEventListener('touchstart', (e) => {
  if (adminPrimed) {
    e.preventDefault();
    openAdminPanel();
    return;
  }
  adminLongPressTimer = setTimeout(primeAdmin, 5000);
}, { passive: false });

document.querySelector('.hero-emoji').addEventListener('touchend', () => {
  clearTimeout(adminLongPressTimer);
});
document.querySelector('.hero-emoji').addEventListener('touchmove', () => {
  clearTimeout(adminLongPressTimer);
});

// 桌面端：鼠标长按 5 秒 → 松手 prime → 再点一下打开
document.querySelector('.hero-emoji').addEventListener('mousedown', (e) => {
  if (adminPrimed) {
    openAdminPanel();
    return;
  }
  adminLongPressTimer = setTimeout(primeAdmin, 5000);
});
document.querySelector('.hero-emoji').addEventListener('mouseup', () => {
  clearTimeout(adminLongPressTimer);
});
document.querySelector('.hero-emoji').addEventListener('mouseleave', () => {
  clearTimeout(adminLongPressTimer);
});

document.getElementById('admin-close').addEventListener('click', () => {
  document.getElementById('admin-panel').classList.remove('visible');
});

// ==================== 启动 ====================
window.addEventListener('DOMContentLoaded', init);

// 定期检查是否有活动到时间自动解锁（每分钟检查，自动刷新 UI）
setInterval(() => {
  let changed = false;
  activities.forEach(act => {
    if (act.state === 'locked' && new Date() >= new Date(act.unlockTime)) {
      act.isUnlocked = true;
      act.state = 'unlocked-unopened';
      act.isOpened = false;
      newlyUnlockedIds.add(act.id);
      changed = true;
    }
  });
  if (changed) {
    renderAll();
    updateProgress();
    startCountdownTimers();
    // 更新 session
    sessionStorage.setItem('birthday-known-unlocked', JSON.stringify(
      activities.filter(a => a.isUnlocked).map(a => a.id)
    ));
  }
}, 30000);

// ==================== 处理 WeChat 内 JS-SDK 兼容 ====================
document.addEventListener('touchmove', function(e) {
  if (e.target.closest('.admin-panel')) return;
}, { passive: true });
</script>
